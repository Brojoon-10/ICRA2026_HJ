#!/usr/bin/env python
### HJ : Reorganized into 3 collapsible groups (GGV / Raceline / FBGA) with
###      concise English descriptions for rqt_reconfigure tooltips.
PACKAGE = "stack_master"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# ========== GGV group ==========
ggv = gen.add_group("GGV", state=True)

# Grip scales (lap-time dominant)
ggv.add("lambda_mu_x", double_t, 0,
        "Longitudinal grip scale (straight accel/brake limit)",
        1.2, 0.6, 1.5)
ggv.add("lambda_mu_y", double_t, 0,
        "Lateral grip scale (corner speed limit)",
        1.2, 0.6, 1.5)

# Power / top speed
ggv.add("P_max", double_t, 0,
        "Motor max power [W]",
        300.0, 100.0, 500.0)
ggv.add("v_max", double_t, 0,
        "Absolute top speed [m/s]",
        12.0, 4.0, 15.0)

# Combined slip shape (load dependence)
ggv.add("p_Dx_2", double_t, 0,
        "Long. load sensitivity (0=optimistic, negative=conservative)",
        0.0, -1.0, 1.0)
ggv.add("p_Dy_2", double_t, 0,
        "Lat. load sensitivity (0=optimistic, negative=conservative)",
        0.0, -1.0, 1.0)
## IY : friction — split into longitudinal (x) and lateral (y)
ggv.add("p_Dx_1", double_t, 0,
        "Longitudinal peak friction (accel/brake limit)",
        1.0, 0.3, 1.5)
ggv.add("p_Dy_1", double_t, 0,
        "Lateral peak friction (cornering limit)",
        1.0, 0.3, 1.5)
## IY : end

# Vehicle behavior
ggv.add("epsilon", double_t, 0,
        "Roll stiffness split (0.5=neutral, <0.5=OS, >0.5=US)",
        0.5, 0.3, 0.7)

# NLP caps (0 = unlimited)
ggv.add("P_brake_max", double_t, 0,
        "Brake power cap [W] (0=unlimited, F_brake*V <= cap)",
        0.0, 0.0, 500.0)
ggv.add("ax_max_cap", double_t, 0,
        "Accel cap [m/s^2] (0=unlimited)",
        0.0, 0.0, 10.0)
ggv.add("ax_min_cap", double_t, 0,
        "Decel cap [m/s^2] (positive value, 0=unlimited)",
        0.0, 0.0, 10.0)
ggv.add("ay_max_cap", double_t, 0,
        "Lateral accel cap [m/s^2] (0=unlimited)",
        0.0, 0.0, 10.0)

# Diamond post-processing scales (1.0 = NLP as-is, no-op)
ggv.add("gg_exp_scale", double_t, 0,
        "Diamond exponent scale (1.0=NLP, <1=diamond-like, >1=circular)",
        1.0, 0.5, 1.5)
ggv.add("ax_max_scale", double_t, 0,
        "Diamond ax_max scale (1.0=NLP, <1=reduce accel envelope)",
        1.0, 0.5, 1.5)
ggv.add("ax_min_scale", double_t, 0,
        "Diamond ax_min scale (1.0=NLP, <1=reduce decel envelope)",
        1.0, 0.5, 1.5)
ggv.add("ay_scale", double_t, 0,
        "Diamond ay_max scale (1.0=NLP, <1=slower corners)",
        1.0, 0.5, 1.5)

# Pipeline control (GGV stage)
ggv.add("run_ggv", bool_t, 0,
        "Regenerate GGV (False=reuse existing latest)",
        True)
ggv.add("full_resolution", bool_t, 0,
        "GGV full resolution (True=precise/slow, False=fast)",
        False)

# ========== Raceline group ==========
raceline = gen.add_group("Raceline", state=True)

raceline.add("regen_raceline", bool_t, 0,
             "Re-optimize raceline (start_from=5)",
             False)
raceline.add("map", str_t, 0,
             "Map name (required for raceline regen; maps/<name>/)",
             "eng_0410_v5")
raceline.add("safety_distance", double_t, 0,
             "Track wall margin [m] (reduce for narrow tracks)",
             0.20, 0.05, 0.50)
raceline.add("V_min", double_t, 0,
             "Raceline minimum speed [m/s] (0=unlimited)",
             2.0, 0.0, 5.0)
raceline.add("w_T", double_t, 0,
             "Time weight (1=min-time optimization)",
             1.0, 0.0, 10.0)
raceline.add("w_jx", double_t, 0,
             "Longitudinal jerk weight (higher=smoother accel/brake)",
             0.01, 0.0, 1.0)
raceline.add("w_jy", double_t, 0,
             "Lateral jerk weight (higher=smoother cornering)",
             0.01, 0.0, 1.0)
raceline.add("w_dOmega_z", double_t, 0,
             "Curvature weight (higher=flatter line)",
             0.0, 0.0, 10.0)

# ========== Stage 4 vel engine selector (root) ==========
## IY : single selector replaces run_fbga (bool). Only one engine publishes
##   /global_waypoints at a time → publisher conflict prevented.
vel_engine_enum = gen.enum([
    gen.const("none",   str_t, "none",   "Stage 4 disabled"),
    gen.const("fbga",   str_t, "fbga",   "FBGA forward/backward (C++ binary)"),
    gen.const("velopt", str_t, "velopt", "3d_optimized_vel_planner NLP"),
], "Stage 4 velocity engine selector")
gen.add("vel_engine", str_t, 0,
        "Stage 4 engine: none / fbga / velopt",
        "none", edit_method=vel_engine_enum)
## IY : end

# ========== FBGA group ==========
fbga = gen.add_group("FBGA", state=True)

fbga.add("enable_mu", bool_t, 0,
         "FBGA mu compensation (True=use pitch/slope, False=g_tilde only)",
         True)
## IY : bridge_effect (renamed from g_weight, now matches 2.5d_vel_planner slope_correction)
##   sin(mu)*N scaling on C++ FBGA ax_gravity. 1=physics, higher=more conservative.
fbga.add("bridge_effect", double_t, 0,
         "Slope ax_grav scale (1=physics, higher=more conservative). "
         "Same role as 2.5d_vel_planner slope_correction.",
         1.0, 0.0, 5.0)
fbga.add("g_tilde_soft_beta", double_t, 0,
         "softplus floor sharpness for g_tilde (1/beta m/s^2)",
         20.0, 1.0, 100.0)
fbga.add("smooth_mu", bool_t, 0,
         "SG filter on mu / dmu_ds (kills cm-scale PCD noise)",
         True)
fbga.add("mu_smooth_window", int_t, 0,
         "SG window length for mu (odd)",
         21, 5, 51)
fbga.add("mu_smooth_polyorder", int_t, 0,
         "SG polynomial order for mu",
         3, 1, 5)
fbga.add("smooth_kappa", bool_t, 0,
         "SG filter on kappa for vel calc only (path preserved)",
         True)
fbga.add("kappa_smooth_window", int_t, 0,
         "SG window length for kappa (odd)",
         21, 5, 51)
fbga.add("kappa_smooth_polyorder", int_t, 0,
         "SG polynomial order for kappa",
         3, 1, 5)
fbga.add("slope_brake_margin", double_t, 0,
         "Pre-slope braking distance [m] (0=off)",
         0.0, 0.0, 10.0)
fbga.add("slope_brake_vmax", double_t, 0,
         "Pre-slope Vmax cap [m/s]",
         5.0, 0.5, 15.0)
## IY : end

# ========== VelOpt group (3d_optimized_vel_planner NLP) ==========
## IY : NLP knobs + separate bridge_effect (fbga 와 다른 값으로 운영 가능).
##   Defaults / ranges restored from original GGTuner3D.cfg.
velopt = gen.add_group("VelOpt", state=True)
velopt.add("velopt_bridge_effect", double_t, 0,
           "VelOpt bridge_effect (Track3D g_weight, fbga 와 독립). "
           "1=physics, higher=more conservative.",
           1.0, 0.0, 5.0)
velopt.add("velopt_V_min", double_t, 0,
           "VelOpt min speed bound [m/s]",
           1.0, 0.0, 5.0)
velopt.add("velopt_gg_margin", double_t, 0,
           "VelOpt GGV shrink margin (0.0=full grip)",
           0.0, 0.0, 0.5)
velopt.add("velopt_step_size", double_t, 0,
           "VelOpt NLP grid spacing [m]",
           0.2, 0.05, 0.5)
velopt.add("velopt_w_T", double_t, 0,
           "VelOpt time weight (1.0=min-time; higher=more aggressive)",
           1.0, 0.0, 10.0)
velopt.add("velopt_w_jx", double_t, 0,
           "VelOpt jerk regularization (higher=smoother accel/brake)",
           0.01, 0.0, 1.0)
## IY : asymmetric jerk + corner-only smoothing (w_jx 와 함께 곱해짐).
##   ratio=1, alpha=0 이면 기존 대칭 동작과 동일.
velopt.add("velopt_w_jx_acc_ratio", double_t, 0,
           "VelOpt accel-side jerk weight ratio (>1 = smoother accel)",
           1.0, 0.0, 5.0)
velopt.add("velopt_w_jx_brk_ratio", double_t, 0,
           "VelOpt brake-side jerk weight ratio "
           "(>1 = smoother brake → earlier brake onset)",
           1.0, 0.0, 5.0)
velopt.add("velopt_w_jx_curv_alpha", double_t, 0,
           "VelOpt curvature-weighted jerk multiplier "
           "(0=off, >0 = corner-only smoothing)",
           0.0, 0.0, 10.0)

# ========== Sector slicing group ==========
## IY : sector_slicing — checkbox spawns/kills 3d_sector_slicing.launch
##   (general/ot/static_obs/friction sector tuners) for the selected map.
sectors = gen.add_group("Sectors", state=True)
sectors.add("run_sector_slicing", bool_t, 0,
            "Spawn/kill 3d_sector_slicing.launch for the selected map "
            "(interactive RViz workflow). Off = nodes killed.",
            False)

# ========== Triggers (root, always visible) ==========
gen.add("apply", bool_t, 0,
        "Run pipeline (auto-cleared after trigger)",
        False)
gen.add("save_now", bool_t, 0,
        "Snapshot current latest to v<N+1> (independent of apply)",
        False)

exit(gen.generate(PACKAGE, "gg_tuner", "GGTuner"))
