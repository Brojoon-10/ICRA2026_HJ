#!/usr/bin/env python
### HJ : Live tuning for test_control_publisher (manual launch test rig).
PACKAGE = "stack_master"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# Steering held at 0 by default (manual rig). Expose if you want to nudge.
gen.add("cmd_steering_rad", double_t, 0,
        "Steering command [rad] (0 = straight)",
        0.0, -0.4, 0.4)

# Post-launch target speed for VESC speed PID. Should be > expected end-of-launch v
# so PI sees positive error and keeps current up after handoff.
gen.add("cmd_speed_mps", double_t, 0,
        "Target speed after launch handoff [m/s]. Set > end-of-launch v for clean handoff.",
        0.5, -3.0, 12.0)

# How long after RB rising to keep publishing cmd_speed_mps. After this, publisher
# forces speed=0 (motor coast) and auto-closes CSV/PNG (same as pressing LB).
gen.add("cmd_duration_sec", double_t, 0,
        "Auto-cutoff: publish cmd_speed for this many seconds after RB, then 0 + close CSV.",
        2.0, 0.1, 10.0)

exit(gen.generate(PACKAGE, "test_control_publisher", "TestCtrl"))
