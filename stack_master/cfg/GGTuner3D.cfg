#!/usr/bin/env python
### HJ : GGTuner3D — same flow as GGTuner, but Stage 4 drives
###      3d_optimized_vel_planner.py (NLP velocity re-optimization)
###      instead of FBGA. Independent cfg so the two tuners can coexist.
PACKAGE = "stack_master"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# ========== GGV group ==========
ggv = gen.add_group("GGV", state=True)

ggv.add("lambda_mu_x", double_t, 0,
        "Longitudinal grip scale (straight accel/brake limit)",
        1.2, 0.6, 1.5)
ggv.add("lambda_mu_y", double_t, 0,
        "Lateral grip scale (corner speed limit)",
        1.2, 0.6, 1.5)
ggv.add("P_max", double_t, 0,
        "Motor max power [W]",
        300.0, 100.0, 500.0)
ggv.add("v_max", double_t, 0,
        "Absolute top speed [m/s]",
        12.0, 4.0, 15.0)
ggv.add("p_Dx_2", double_t, 0,
        "Long. load sensitivity (0=optimistic, negative=conservative)",
        0.0, -1.0, 1.0)
ggv.add("p_Dy_2", double_t, 0,
        "Lat. load sensitivity (0=optimistic, negative=conservative)",
        0.0, -1.0, 1.0)
## IY : friction overrides p_Dx_1 = p_Dy_1 (lambda_mu multiplies on top)
ggv.add("friction", double_t, 0,
        "Tire peak friction p_Dx_1 = p_Dy_1",
        1.0, 0.3, 1.5)
## IY : end
ggv.add("epsilon", double_t, 0,
        "Roll stiffness split (0.5=neutral, <0.5=OS, >0.5=US)",
        0.5, 0.3, 0.7)
ggv.add("P_brake_max", double_t, 0,
        "Brake power cap [W] (0=unlimited)",
        0.0, 0.0, 500.0)
ggv.add("ax_max_cap", double_t, 0,
        "Accel cap [m/s^2] (0=unlimited)",
        0.0, 0.0, 10.0)
ggv.add("ax_min_cap", double_t, 0,
        "Decel cap [m/s^2] (positive value, 0=unlimited)",
        0.0, 0.0, 10.0)
ggv.add("ay_max_cap", double_t, 0,
        "Lateral accel cap [m/s^2] (0=unlimited)",
        0.0, 0.0, 10.0)
ggv.add("gg_exp_scale", double_t, 0,
        "Diamond exponent scale (1.0=NLP as-is)",
        1.0, 0.5, 1.5)
ggv.add("ax_max_scale", double_t, 0,
        "Diamond ax_max scale (1.0=NLP as-is)",
        1.0, 0.5, 1.5)
ggv.add("ax_min_scale", double_t, 0,
        "Diamond ax_min scale (1.0=NLP as-is)",
        1.0, 0.5, 1.5)
ggv.add("ay_scale", double_t, 0,
        "Diamond ay_max scale (1.0=NLP as-is)",
        1.0, 0.5, 1.5)
ggv.add("run_ggv", bool_t, 0,
        "Regenerate GGV (False=reuse existing latest)",
        True)
ggv.add("full_resolution", bool_t, 0,
        "GGV full resolution (True=precise/slow, False=fast)",
        False)
## IY : per-sector snapshot selector (velopt only). Empty=latest.
ggv.add("ggv_sector0", str_t, 0, "Sector0 snapshot name (empty=latest)", "")
ggv.add("ggv_sector1", str_t, 0, "Sector1 snapshot name (empty=latest)", "")
ggv.add("ggv_sector2", str_t, 0, "Sector2 snapshot name (empty=latest)", "")
ggv.add("ggv_sector3", str_t, 0, "Sector3 snapshot name (empty=latest)", "")
ggv.add("ggv_sector4", str_t, 0, "Sector4 snapshot name (empty=latest)", "")
## IY : end

# ========== Raceline group ==========
raceline = gen.add_group("Raceline", state=True)

raceline.add("regen_raceline", bool_t, 0,
             "Re-optimize raceline (start_from=5)",
             False)
raceline.add("map", str_t, 0,
             "Map name (required for raceline regen)",
             "eng_0410_v5")
## IY : raceline GGV snapshot selector (empty=latest)
raceline.add("raceline_ggv", str_t, 0,
             "Snapshot name for raceline GGV (empty=latest)",
             "")
## IY : end
raceline.add("safety_distance", double_t, 0,
             "Track wall margin [m]",
             0.20, 0.05, 0.50)
raceline.add("V_min", double_t, 0,
             "Raceline minimum speed [m/s]",
             2.0, 0.0, 5.0)
raceline.add("w_T", double_t, 0,
             "Time weight (1=min-time)",
             1.0, 0.0, 10.0)
raceline.add("w_jx", double_t, 0,
             "Longitudinal jerk weight",
             0.01, 0.0, 1.0)
raceline.add("w_jy", double_t, 0,
             "Lateral jerk weight",
             0.01, 0.0, 1.0)
raceline.add("w_dOmega_z", double_t, 0,
             "Curvature weight (flat-line preference)",
             0.0, 0.0, 10.0)

# ========== VelOpt group (Stage 4: 3d_optimized_vel_planner.py) ==========
velopt = gen.add_group("VelOpt", state=True)

velopt.add("run_velopt", bool_t, 0,
           "Run 3d_optimized_vel_planner (reload-first, cold-start fallback)",
           False)
velopt.add("velopt_V_min", double_t, 0,
           "VelOpt min speed bound [m/s]",
           1.0, 0.0, 5.0)
velopt.add("velopt_gg_margin", double_t, 0,
           "VelOpt GGV shrink margin (0.0=full grip)",
           0.0, 0.0, 0.5)
velopt.add("velopt_step_size", double_t, 0,
           "VelOpt NLP grid spacing [m] (auto-adjusted to track length)",
           0.2, 0.05, 0.5)
## IY : VelOpt NLP cost weights — time vs smoothness trade-off.
#       Kept separate from Raceline.w_T / Raceline.w_jx because they feed
#       different NLPs (path+speed vs speed-only).
velopt.add("velopt_w_T", double_t, 0,
           "VelOpt time weight (1.0=min-time; higher=more aggressive)",
           1.0, 0.0, 10.0)
velopt.add("velopt_w_jx", double_t, 0,
           "VelOpt jerk regularization (higher=smoother accel/brake)",
           0.01, 0.0, 1.0)
## IY : end

# ========== Triggers (root) ==========
gen.add("apply", bool_t, 0,
        "Run pipeline (auto-cleared after trigger)",
        False)
gen.add("save_now", bool_t, 0,
        "Snapshot current latest to v<N+1> (independent of apply)",
        False)

exit(gen.generate(PACKAGE, "gg_tuner_3d", "GGTuner3D"))
