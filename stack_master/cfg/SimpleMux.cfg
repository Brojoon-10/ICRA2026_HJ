#!/usr/bin/env python
### HJ : Live tuning of standing-start launch parameters via rqt_reconfigure.
PACKAGE = "stack_master"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# Launch torque target (the single most important knob; sweep until wheelspin)
gen.add("launch_current_A", double_t, 0,
        "Constant motor current held during launch active window [A]. Sweep up from rotation-start.",
        15.0, 0.0, 80.0)

# Launch active window length
gen.add("launch_t_total", double_t, 0,
        "Launch active duration [s]. After this, mux hands off to controller speed PID.",
        0.75, 0.05, 2.0)

# Post-launch handoff safety
gen.add("launch_safety_floor_margin", double_t, 0,
        "Speed floor margin above measured for 100ms after launch ends [m/s]. Defends Case A (target<measured).",
        0.1, 0.0, 1.0)

exit(gen.generate(PACKAGE, "simple_mux", "SimpleMux"))
