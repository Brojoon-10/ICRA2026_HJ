#!/usr/bin/env python
## IY : dynamic_reconfigure for fast_sqp_planner live tuning
PACKAGE = "fast_sqp_planner"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# ---- velocity mode ----
vel_mode_enum = gen.enum([
    gen.const("mode_2_5d", str_t, "2_5d", "vel_planner_25d slope gravity correction"),
    gen.const("mode_3d",   str_t, "3d",   "g_tilde fixed-point iteration + 3D GGV"),
    gen.const("mode_nlp",  str_t, "nlp",  "CasADi IPOPT reduced NLP (V+ax)"),
], "velocity mode selector")
gen.add("velocity_mode", str_t, 0, "Velocity profile mode", "2_5d", edit_method=vel_mode_enum)

# ---- shape / horizon ----
gen.add("lookahead",            double_t, 0, "Lookahead distance (m)",           10.0, 3.0, 30.0)
gen.add("evasion_dist",         double_t, 0, "Evasion lateral margin (m)",       0.35, 0.1, 1.0)
gen.add("prediction_horizon_s", double_t, 0, "GP prediction horizon (s)",        0.5,  0.1, 3.0)
gen.add("obs_sigma_k",         double_t, 0, "obs_min += sigma_k * sqrt(d_var)",  2.0,  0.0, 6.0)
gen.add("T_horizon",            double_t, 0, "Rolling time horizon (s)",         2.0,  0.5, 5.0)
gen.add("s_min_horizon",        double_t, 0, "Min arc-length horizon (m)",       9.0,  3.0, 30.0)

# ---- SQP cost weights ----
gen.add("lambda_reg",        double_t, 0, "Regularization (d toward raceline)",   500.0,    0.0, 50000.0)
gen.add("lambda_smooth",     double_t, 0, "Path smoothness",                  100000.0,    0.0, 500000.0)
gen.add("lambda_jerk",       double_t, 0, "Jerk penalty",                      50000.0,    0.0, 500000.0)
gen.add("lambda_obs",        double_t, 0, "Obstacle avoidance",                 3000.0,    0.0, 50000.0)
gen.add("lambda_obs_smooth", double_t, 0, "Lateral rate near obstacle",        10000.0,    0.0, 100000.0)
gen.add("lambda_kappa",      double_t, 0, "Curvature penalty",                  5000.0,    0.0, 50000.0)
gen.add("lambda_gg",         double_t, 0, "GG feasibility penalty",             5000.0,    0.0, 50000.0)
gen.add("lambda_near_reg",   double_t, 0, "Near-knot regularization",          10000.0,    0.0, 100000.0)
gen.add("lambda_side",       double_t, 0, "Side preference (inside curve)",         8.0,    0.0, 100.0)
gen.add("lambda_start_heading", double_t, 0, "Start heading alignment",          3000.0,    0.0, 50000.0)
gen.add("lambda_term",         double_t, 0, "Terminal knot toward raceline",        0.0,    0.0, 50000.0)

# ---- misc ----
gen.add("near_knots_K",      int_t,    0, "Near-knot count for regularization",    15,   0,   30)
gen.add("obs_ramp_knots",    int_t,    0, "Ramp obs penalty over first N knots (0=off)", 5, 0, 30)

# ---- GGV reload ----
gen.add("reload_ggv",        bool_t,   0, "Check to reload GGV from disk (auto-resets)", False)

exit(gen.generate(PACKAGE, "fast_sqp_planner", "FastSQPPlanner"))
## IY : end
