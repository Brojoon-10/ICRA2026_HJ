# ============================================================
# ### HJ : state_overtake.yaml
# MPC planner — `~state:=overtake` preset.
#
# Purpose:
#   Replaces spliner / SQP / static_avoidance / lane_change. Reference is
#   raceline (/global_waypoints); avoidance emerges from NLP itself under
#   the soft repulsive obstacle cost (Phase 3.5 Stage-1). Output topic
#   (via launch remap): /planner/avoidance/otwpnts_observation
#   (attach_to_statemachine:=false keeps it debug-only).
#
# Design deltas vs. observe:
#   - w_contour ↓  — raceline pull is weakened so the solver can swing wide
#                    for avoidance.
#   - w_dsteering ↑ — lane-change must stay smooth.
#   - boundary_inflation ↓ — corridor usable closer to edges.
#   - ipopt_max_iter ↑     — NLP harder with obstacle terms, need more iters.
#   - w_velocity will be dropped to 0.1 in Phase 4 (shape-first). For now
#     the original 3.0 is kept so Phase 3 changes are isolated to cost
#     reshaping + obstacle stubs.
#
# Obstacle terms (collision_mode / w_obstacle / obstacle_sigma / n_obs_max /
# w_wall / wall_safe) become active once Phase 3.5 injects the repulsive cost into the
# solver. Before then the node reads them but the solver ignores them.
# ============================================================

planner_freq: 30

# Horizon
N: 20
dT: 0.05

# Vehicle
vehicle_L: 0.33

# Limits
# ### HJ : Phase 4 — min_speed=0 허용. velocity planner가 덮어쓰는 "형상 우선"
# 솔버이므로 MPC 내부 속도 하한은 의미가 옅음. degeneracy 는 solver의
# kinematic_v_eps + w_steer_reg 로 방어.
max_speed: 10.0
min_speed: 0.0
max_steering: 0.6

# Cost weights
# ### HJ : Phase 4 — w_velocity ↓ (3.0→0.1), v_bias_max ↑ (1.5→3.0).
# 속도는 2.5d vel planner가 덮어쓰니 tiny anchor만 유지. 형상 중심 cost.
w_contour: 2.0       # ↓ (allow lateral deviation for avoidance)
w_lag: 0.8
w_velocity: 0.1
v_bias_max: 3.0

# ### HJ : v3 — stage ramps OFF (1.0 = flat). v2c's 0.4/0.6 made near-car
# contour weight ~0.8 vs late-horizon ~2.0 → U-shape pull → "only trajectory
# end leaves the wall" with straight-line kinks mid-horizon. v3 uses uniform
# q_n over the horizon + terminal q_n_term (see below) to shape return to
# raceline; legacy MPCC still honours the ramp knobs.
contour_ramp_start: 1.0
lag_ramp_start: 1.0

# Smoothness
w_dv: 9.5
w_dsteering: 20.0    # ↑ (smooth lane change)

# Boundary
# ### HJ : v2c — w_slack 2000→5000. v2b capture showed solver preferred
# wall penetration (margin_R_min=-0.139, slack≈0.22m) over obstacle
# avoidance (cost_obs=500-663) because cost_slack=450-556 was cheaper.
# Raising w_slack ×2.5 makes corridor violation strictly more expensive
# than even max obstacle pushback.
# ### HJ : v3b — wall_safe is a BODY-EDGE safety requirement, NOT a
# centroid one. Solver.wall_safe + inflation + ego_half_width together
# form the hard corridor for the centroid; the body edge is guaranteed
# to stay ≥ wall_safe + inflation = 0.20 m from the wall regardless of
# solver tricks. If corridor is too narrow to pass a side, side_decider
# MUST force SIDE_TRAIL instead of relaxing this margin — the v_max cap
# in _build_vmax then produces a safe trailing trajectory.
boundary_inflation: 0.05
w_slack: 5000.0

# IPOPT
# ### HJ : v3b — 1000→200. 210ms infeasible solves = IPOPT burning the full
# iter budget before declaring failure. Typical successful solve is ~15 iter,
# so 200 is >10× headroom. Clips worst-case fail to ~40ms → fallback ladder
# engages 5× faster, total "solver dead" gap 0.87s → ~0.17s.
ipopt_max_iter: 200
ipopt_print_level: 0
# ### HJ : v3c+ — HSL ma27 (2~3× faster than MUMPS on our sparsity).
# libhsl.so path: /usr/local/lib/python3.8/dist-packages/casadi/libhsl.so
# (symlink to fast_ggv_gen/solver/install/.../libcoinhsl.so, built by
# setup_hsl.sh). Set to 'mumps' to revert.
linear_solver: ma27

# Obstacle cost (Phase 3.5 Stage-1)
# ### HJ : tuning 이력
#   - σ=0.35 (초기): d=1m 에서 cost=8.4 (무의미). 궤적이 observe와 거의
#     동일. σ 너무 좁음.
#   - σ=0.7, w=800 (시도): horizon 전체가 장애물 영향권에 들어가서 여러
#     방향 밀어내기 충돌 → 궤적 꼬불거림 발생. σ 너무 넓음.
#   - σ=0.5, w=400 (현재): d=1m 에서 54, d=0.5m 에서 242, d=0.35m 에서
#     312. 1m 이내 근거리에서만 확실히 밀어내고 원거리는 자연 감쇠.
collision_mode: soft
w_obstacle: 400.0
obstacle_sigma: 0.5
n_obs_max: 2
# ### HJ : Convex wall-buffer soft cost — pushes n_k off the corridor edge
# by `wall_safe` when it hugs within that margin. Quadratic one-sided
# hinge, so solver stays convex locally (unlike the elliptical hinge that
# caused warm-start local-min lockups).
w_wall: 150.0         # legacy MPCC only — FrenetKin uses w_wall_buf below
# ### HJ : v3c — wall_safe is BODY-EDGE hard-survival margin.
# Hard solver bound: |n| ≤ d_wall - ego_half(0.15) - wall_safe - inflation.
# 0.08 → body-edge ≥ 0.13 m hard. Tight but feasible even on 0.8 m-wide
# sections. Real safety goal (0.20 m body-edge) is enforced by the soft
# wall_buf cushion below, which has w_wall_buf=2500 to dominate obstacle
# pushback in normal conditions.
wall_safe: 0.08

# ============================================================
# ### HJ : FrenetKinMPC (solver_backend=frenet_kin) params
# 2026-04-21 redesign v2: soft obstacle cost + hard corridor on walls only.
# Corridor now stays the same across LEFT/RIGHT side flips → warm-start
# survives → trajectory deforms continuously instead of jumping.
# ============================================================
# Cost weights (state [n, mu, v], control [a, delta])
q_n: 3.0              # n^2 contour weight
gamma_progress: 10.0  # progress (-v) pull
r_a: 0.5              # Δa smoothness
r_delta: 1.5          # steer-rate smoothness (5→1.5 made shape less stiff)
r_steer_reg: 0.1      # steering magnitude regulariser

# Soft obstacle bubble (replaces v1 hard half-plane).
# Bubble is Gaussian in both (s, n). The s-envelope (exp(-ds²/σ_s²)) also
# gates the side bias, so bias only fires where the obstacle is — corridor
# stays free away from obstacles (fixes "wall hugging" observed in v2a).
w_obs: 180.0          # ### HJ : v2c — 300→180. Obstacle push-away must NOT
                      # outrun wall cushion; wall is absolute, obstacle is
                      # a preference. Lower w_obs + higher w_wall_buf forces
                      # solver to pick "wall-respecting detour" even when it
                      # means passing the obstacle closer than it'd like.
sigma_s_obs: 0.7      # ~ 2 × car length
sigma_n_obs: 0.18     # ### HJ : 0.30→0.18 (v2a→v2b). 0.30 swallowed the
                      # full corridor width (0.9m) and drove slack active.

# Side bias: proximity-gated one-sided quadratic penalty. Direction flips
# on side change but COST MAGNITUDE is near-zero outside the obstacle's
# s-envelope, so LEFT↔RIGHT flips affect only the local neighborhood —
# trajectory far from the obstacle doesn't wobble.
w_side_bias: 25.0     # ### HJ : 80→25 (v2a→v2b). 80 + global bias (v2a) drove
                      # mean bias cost 106 (max 551) >> w_contour — solver
                      # was chasing bias instead of racing line.
gap_lat: 0.25         # lateral clearance to obstacle for bias zero-line
gap_long: 0.8         # (legacy knob; no longer gates any constraint in v2)

# Soft wall cushion — quadratic hinge fires `wall_buf` inside the raw wall.
# ### HJ : v3 — w_wall_buf 400→2500 (×6). The "boundary-layer glue" that
# caused straight-line kinks near the wall came from the hard corridor
# constraint becoming active when the cushion pressure was insufficient.
# At 2500, hitting the cushion is ~35× more expensive than the obstacle
# bubble peak, so the solver NEVER approaches the hard bound → trajectory
# stays smooth all the way to the wall edge.
w_wall_buf: 2500.0
wall_buf: 0.30        # > wall_safe(0.10) so soft cushion kicks in first

# ### HJ : v3 — C^1 curvature (δ as state, δ̇ as input). Solver-level
# smoothness guarantee. r_dd penalises steering-rate, r_dd_rate penalises
# steering-jerk. Combined → κ(s) continuous AND differentiable.
r_dd: 5.0
r_dd_rate: 1.0
delta_rate_max: 3.0   # rad/s steer-rate limit (hard input bound)

# ### HJ : v3 — tick-to-tick solution continuity. On each tick the solver
# pulls n_k toward prev solve's n_{k+1} (shifted). Makes the trajectory
# morph continuously instead of snapping to a new optimum.
# ### HJ : v3b — 20→200 (×10). 41-tick capture showed jitter_rms_m p95=0.281
# (target <0.10). cost.cont was 0.14 mean, way below contour(1.33)/term(0.48),
# so the solver happily let each step drift ~4cm/tick → √21 × 4cm ≈ 18cm
# trajectory jitter. Raising w_cont to 200 makes continuity the dominant
# cost, locking tick-to-tick shape unless a real obstacle/wall forces a move.
w_cont: 200.0

# ### HJ : v3 — terminal stability cost. Replaces the "only end leaves
# wall" stage-ramp hack. q_n_term pulls n[N]→0 (raceline), q_v_term
# pulls v[N]→ref_v.
q_n_term: 10.0
q_v_term: 0.5

# Side decider hysteresis + feasibility gate (v3).
side_hold_ticks: 10
# ### HJ : v3 — feasibility-aware side decision. d_free side slot must
# clear (ego_half + gap_lat + min_pass_margin) before SideDecider picks it;
# otherwise forces TRAIL. Prevents "squeeze into 5cm slot" failures.
min_pass_margin: 0.10
trail_entry_ticks: 3  # TRAIL fires fast (~0.1s) — "못 갈 것 같으면 바로 감속"

# ### HJ : v3 — obstacle s/n EMA filter. Opponent predictor jitter was
# shaking the bubble centre tick-to-tick and rattling the cost landscape.
# α=0.30 gives ~3-tick time constant — filtered fast enough that real
# obstacle motion still tracks.
obs_ema_alpha: 0.30

# ### HJ : v3 — TRAIL velocity ramp. On TRAIL commit, v_max cap is ramped
# in over 8 ticks (~0.27s) rather than snapping. Node-side param.
trail_vel_ramp_ticks: 8

# (ipopt_max_iter 200 above — iter=15 typical, 200 caps worst-case fail ~40ms)
