#!/usr/bin/env python
# =============================================================================
#  FrenetKinCost.cfg
#  Live rqt_reconfigure knobs for FrenetKinMPC (solver_backend=frenet_kin).
#
#  Every slider here maps to an opti.parameter() in src/frenet_kin_solver.py,
#  so a drag-and-drop in rqt applies on the NEXT solve with zero NLP rebuild
#  and JIT stays warm.
#
#  Legacy MPCC / Frenet-D backends keep using MPCCost.cfg — the node detects
#  solver_backend at startup and spins up the matching Server().
# =============================================================================

PACKAGE = "mpc_planner"

from dynamic_reconfigure.parameter_generator_catkin import (
    ParameterGenerator, double_t, int_t, bool_t)

gen = ParameterGenerator()

# --- Raceline contour + terminal -----------------------------------------
gen.add("q_n",            double_t, 0,
        "Raceline contour weight: Sum n_k^2. HIGHER pulls harder to the raceline (narrower avoidance); LOWER lets the solver swing wide for overtakes.",
        3.0,   0.0, 100.0)
gen.add("q_n_term",       double_t, 0,
        "Terminal n weight: n_N^2 at horizon end. Ensures the trajectory returns to the raceline after an avoidance swing. Usually 2-5x q_n.",
        10.0,  0.0, 200.0)
gen.add("q_v_term",       double_t, 0,
        "Terminal velocity weight: (v_N - v_ref_N)^2. Small anchor to the reference speed at horizon end. Velocity planner downstream overrides so keep tiny.",
        0.5,   0.0, 50.0)

# --- Racing drive ---------------------------------------------------------
gen.add("gamma_progress", double_t, 0,
        "Progress drive: -gamma * Sum v*cos(mu)*dT. HIGHER = more aggressive push to saturate vmax. Balanced against q_n: typical gamma/q_n ratio is 3-5.",
        10.0,  0.0, 100.0)

# --- Smoothness penalties -------------------------------------------------
gen.add("r_a",            double_t, 0,
        "Accel jerk weight: (a_{k+1}-a_k)^2. Smooths the speed profile; higher = gentler accel changes, but less responsive braking.",
        0.5,   0.0, 20.0)
gen.add("r_steer_reg",    double_t, 0,
        "Steering zero-bias: delta^2. Weak numerical regulariser; keeps delta from drifting in degenerate straight-line cases. Rarely tuned.",
        0.1,   0.0, 10.0)
gen.add("r_dd",           double_t, 0,
        "Steer-rate weight: delta_dot^2. Directly penalises curvature rate (kappa = tan(delta)/L). Higher = smoother steering but slower lane-change reaction.",
        5.0,   0.0, 50.0)
gen.add("r_dd_rate",      double_t, 0,
        "Steer-jerk weight: (delta_dot_{k+1}-delta_dot_k)^2. C^1 guarantee for curvature. Prevents kinks at horizon knots; keep low (0.5-2).",
        1.0,   0.0, 20.0)

# --- Obstacle avoidance ---------------------------------------------------
gen.add("w_obs",          double_t, 0,
        "Obstacle bubble peak weight. Gaussian * w_obs at the bubble centre. Must stay below w_wall_buf so walls always beat obstacles. Typical 100-300.",
        180.0, 0.0, 2000.0)
gen.add("sigma_s_obs",    double_t, 0,
        "Bubble longitudinal scale [m]. Gates the per-step bubble by exp(-(ds/sigma_s)^2). ~2x car length. Keep >= 0.4 to avoid instability near collisions.",
        0.7,   0.05, 3.0)
gen.add("sigma_n_obs",    double_t, 0,
        "Bubble lateral scale [m]. Too wide swallows the whole corridor; too narrow ignores the obstacle. Typical 0.15-0.25.",
        0.18,  0.05, 1.0)
gen.add("w_side_bias",    double_t, 0,
        "Side bias weight (LEFT / RIGHT). One-sided hinge penalty. Only the active side fires (decided by external SideDecider). Magnitude ~20-40.",
        25.0,  0.0, 500.0)
gen.add("gap_lat",        double_t, 0,
        "Lateral clearance [m] used by the side-bias zero-line and the SideDecider feasibility gate. 0.2-0.3 for 1:10 F1Tenth.",
        0.25,  0.05, 1.0)

# --- Wall cushion (soft) --------------------------------------------------
gen.add("w_wall_buf",     double_t, 0,
        "Wall cushion weight. Hinge at wall_buf into the raw wall. Should dominate w_obs (>= 5x) so 'respect wall even if obstacle pushes' is preserved.",
        2500.0, 0.0, 20000.0)
gen.add("wall_buf",       double_t, 0,
        "Wall cushion thickness [m]. Body-edge triggers cushion when within this distance. Must be GREATER than wall_safe (hard margin).",
        0.30,  0.05, 1.5)

# --- Corridor slack (soft-hard) ------------------------------------------
gen.add("w_slack",        double_t, 0,
        "Hard-corridor slack penalty. Makes the hard wall corridor effectively hard. Should be the LARGEST weight in the stack (>= 2x w_wall_buf).",
        5000.0, 0.0, 100000.0)

# --- Tick-to-tick continuity ---------------------------------------------
gen.add("w_cont",         double_t, 0,
        "Solution-continuity weight: (n_k - n_prev_shifted)^2. Locks trajectory tick-to-tick; raise if jitter_rms grows, lower if slow to react to new obstacles.",
        200.0, 0.0, 2000.0)

# --- Fallback tuning (node-side, no NLP rebuild) -------------------------
gen.add("fail_streak_H",    int_t,    0,
        "Ticks of NLP failure tolerated at tier1 (HOLD_LAST) before escalating to tier2 geometric fallback.",
        5,    1, 60)
gen.add("quintic_delta_s",  double_t, 0,
        "Tier2 quintic fallback return arc length [m]. Longer = gentler rejoin; shorter = aggressive. Typical 6-12.",
        8.0,  1.0, 30.0)

# --- Save / Reload YAML --------------------------------------------------
gen.add("save_params",  bool_t, 0,
        "ONE-SHOT: write current slider values to the instance YAML (state_*.yaml), then auto-flip back to False.",
        False)
gen.add("reset_params", bool_t, 0,
        "ONE-SHOT: reload values from the instance YAML back into the sliders, then auto-flip back to False.",
        False)

exit(gen.generate(PACKAGE, PACKAGE, "FrenetKinCost"))
