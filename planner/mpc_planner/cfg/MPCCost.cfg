#!/usr/bin/env python
# ### HJ : Phase 5 — dynamic_reconfigure for state-aware MPC planner.
# Exposed per-instance (overtake / recovery / observe); each
# mpc_planner_state_node manages its own server.
#
# Cost-term additions here also require matching handling inside
# node/mpc_planner_state_node.py (_weight_cb, _push_params_to_dynreg,
# _save_yaml, _reload_yaml).
#
# Apply-cost notes:
#   * Weight changes & box bounds (v, δ, w_*) — hot (no NLP rebuild).
#   * ipopt_max_iter      — triggers NLP rebuild (opts baked into nlpsol).
#   * n_obs_max           — NOT tunable at runtime (parameter-vector layout
#                           is compile-time). Changing it requires restart.
#   * obstacle_sigma      — triggers NLP rebuild (symbolic 1/(2σ²) coeff).
#   * kinematic_v_eps / w_steer_reg — NLP rebuild (inside _build_nlp).
# Phase 5 Only weights that are pure runtime parameters are exposed as
# sliders for now. The rebuild-required knobs land in Phase 5.1.

PACKAGE = "mpc_planner"

from dynamic_reconfigure.parameter_generator_catkin import (
    ParameterGenerator, double_t, int_t, bool_t, str_t)

gen = ParameterGenerator()

# --- Core MPCC cost weights (hot) ----------------------------------------
gen.add("w_contour",    double_t, 0, "Lateral contouring error weight",         3.9,  0.0, 1000.0)
gen.add("w_lag",        double_t, 0, "Lag (along-tangent) error weight",        2.0,  0.0, 1000.0)
gen.add("w_velocity",   double_t, 0, "Velocity tracking weight (tiny anchor)",  0.1,  0.0, 1000.0)
gen.add("v_bias_max",   double_t, 0, "Velocity deviation normaliser [m/s]",     3.0,  0.1, 20.0)
gen.add("w_dv",         double_t, 0, "Δv smoothness weight",                    9.5,  0.0, 500.0)
gen.add("w_dsteering",  double_t, 0, "Δδ smoothness weight",                   14.0,  0.0, 500.0)
gen.add("w_slack",      double_t, 0, "Soft-boundary slack penalty",          1000.0,  0.0, 100000.0)

# --- Stage-wise contour/lag ramp (hot; triggers NLP rebuild) --------------
# ### HJ : alpha_k = start + (1-start)*k/(N-1). 1.0 = flat (legacy). <1.0
# lets near-car stages drift freely and pulls back to raceline only at
# horizon end — kills the "snap-back overshoot" seen in observe mode.
gen.add("contour_ramp_start", double_t, 0, "Stage-0 contour weight scale (1=flat)", 1.0, 0.0, 1.0)
gen.add("lag_ramp_start",     double_t, 0, "Stage-0 lag weight scale (1=flat)",     1.0, 0.0, 1.0)

# --- Box bounds (hot — lbx/ubx swap) -------------------------------------
gen.add("max_speed",    double_t, 0, "v_max [m/s]",                            12.0,  0.0, 20.0)
gen.add("min_speed",    double_t, 0, "v_min [m/s] (0 allowed; Phase 4 R4 guards)", 0.0, 0.0, 10.0)
gen.add("max_steering", double_t, 0, "|δ_max| [rad]",                           0.6,  0.0, 1.5)
gen.add("boundary_inflation", double_t, 0, "Corridor inflation inside half-width [m]", 0.1, 0.0, 1.0)

# --- Obstacle soft-repulsive cost (Phase 3.5 Stage-1) --------------------
# ### HJ : collision_mode / n_obs_max are NOT live-tunable (they change
# NLP structure). They are loaded once from YAML. w_obstacle / sigma and
# the wall-buffer pair (w_wall/wall_safe) live here so rqt can dial the
# repulsion strength and the off-the-wall margin per bag.
gen.add("w_obstacle",   double_t, 0, "Gaussian obstacle weight per slot",            500.0,   0.0, 100000.0)
gen.add("obstacle_sigma", double_t, 0, "Gaussian width σ [m] — REBUILDS NLP on apply", 0.35, 0.01, 5.0)
gen.add("w_wall",       double_t, 0, "Wall-buffer soft cost weight — REBUILDS NLP", 0.0,     0.0, 100000.0)
gen.add("wall_safe",    double_t, 0, "Wall-buffer margin inside corridor [m] — REBUILDS NLP", 0.15, 0.0, 2.0)

# --- Fallback tuning (Phase 4.3) -----------------------------------------
gen.add("fail_streak_H",    int_t,    0, "Ticks of NLP fail before tier2 (GEOMETRIC)", 5, 1, 60)
gen.add("quintic_delta_s",  double_t, 0, "Tier2 quintic return arc length [m]",       8.0, 1.0, 30.0)

# --- IPOPT (rebuild) -----------------------------------------------------
# ### HJ : Changing this triggers nlpsol rebuild; expect ~50ms stall at apply.
gen.add("ipopt_max_iter", int_t, 0, "IPOPT max_iter — REBUILDS nlpsol on apply",   500, 50, 5000)

# --- YAML save / reset triggers -----------------------------------------
gen.add("save_params",  bool_t, 0, "One-shot: write current params to the instance YAML and flip off", False)
gen.add("reset_params", bool_t, 0, "One-shot: reload the instance YAML into rqt and flip off",         False)

exit(gen.generate(PACKAGE, PACKAGE, "MPCCost"))
